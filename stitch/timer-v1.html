<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Pomodoro Focus</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#e53734",
              "background-light": "#f8f6f6",
              "background-dark": "#171111", 
              "surface-dark": "#251a1a",
              "surface-light": "#ffffff",
            },
            fontFamily: {
              "display": ["Space Grotesk", "sans-serif"],
              "body": ["Space Grotesk", "sans-serif"] 
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen font-display flex flex-col text-slate-900 dark:text-slate-100 overflow-x-hidden transition-colors duration-200">
<div class="layout-container flex h-full grow flex-col">
<!-- Top Navigation -->
<header class="w-full border-b border-gray-200 dark:border-[#382929] px-6 py-4 flex items-center justify-between sticky top-0 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md z-50">
<div class="flex items-center gap-3">
<div class="size-8 flex items-center justify-center rounded-full bg-primary/10 text-primary">
<span class="material-symbols-outlined text-2xl">timer</span>
</div>
<h2 class="text-xl font-bold tracking-tight">Pomodoro Focus</h2>
</div>
<div class="hidden md:flex items-center gap-6">
<nav class="flex items-center gap-6 mr-4">
<a class="text-sm font-medium hover:text-primary transition-colors flex items-center gap-2" href="#">
<span class="material-symbols-outlined text-[20px]">bar_chart</span>
                        Report
                    </a>
<a class="text-sm font-medium hover:text-primary transition-colors flex items-center gap-2" href="#">
<span class="material-symbols-outlined text-[20px]">settings</span>
                        Settings
                    </a>
</nav>
<div class="h-6 w-px bg-gray-300 dark:bg-[#382929]"></div>
<button class="flex items-center gap-2 text-sm font-medium hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">account_circle</span>
                    Login
                </button>
</div>
<!-- Mobile Menu Icon -->
<button class="md:hidden text-2xl">
<span class="material-symbols-outlined">menu</span>
</button>
</header>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col items-center justify-center p-4 sm:p-8 w-full max-w-5xl mx-auto">
<!-- Mode Toggle Tabs -->
<div class="mb-12 w-full max-w-md">
<div class="flex p-1.5 rounded-full bg-white dark:bg-surface-dark shadow-sm border border-gray-200 dark:border-[#382929]">
<label class="flex-1 cursor-pointer relative group">
<input checked="" class="peer sr-only" name="mode" type="radio" value="work"/>
<div class="flex items-center justify-center py-2.5 rounded-full text-sm font-semibold text-gray-500 dark:text-[#b79f9e] transition-all duration-300 peer-checked:bg-primary peer-checked:text-white peer-checked:shadow-md hover:text-gray-900 dark:hover:text-white">
<span class="material-symbols-outlined text-lg mr-2">work_history</span>
                            Work
                        </div>
</label>
<label class="flex-1 cursor-pointer relative group">
<input class="peer sr-only" name="mode" type="radio" value="short"/>
<div class="flex items-center justify-center py-2.5 rounded-full text-sm font-semibold text-gray-500 dark:text-[#b79f9e] transition-all duration-300 peer-checked:bg-primary peer-checked:text-white peer-checked:shadow-md hover:text-gray-900 dark:hover:text-white">
<span class="material-symbols-outlined text-lg mr-2">coffee</span>
                            Short Break
                        </div>
</label>
<label class="flex-1 cursor-pointer relative group">
<input class="peer sr-only" name="mode" type="radio" value="long"/>
<div class="flex items-center justify-center py-2.5 rounded-full text-sm font-semibold text-gray-500 dark:text-[#b79f9e] transition-all duration-300 peer-checked:bg-primary peer-checked:text-white peer-checked:shadow-md hover:text-gray-900 dark:hover:text-white">
<span class="material-symbols-outlined text-lg mr-2">bedtime</span>
                            Long Break
                        </div>
</label>
</div>
</div>
<!-- Timer Display -->
<div class="relative group cursor-default">
<!-- Circular Progress Ring (Decorative) -->
<div class="relative size-72 sm:size-96 rounded-full flex items-center justify-center">
<!-- Outer ring/glow -->
<div class="absolute inset-0 rounded-full border-[6px] border-primary/20 dark:border-primary/10"></div>
<!-- Progress Arc (Simulated with SVG) -->
<svg class="absolute inset-0 size-full -rotate-90" viewbox="0 0 100 100">
<circle class="text-primary" cx="50" cy="50" fill="transparent" r="46" stroke="currentColor" stroke-dasharray="289" stroke-dashoffset="40" stroke-linecap="round" stroke-width="3"></circle>
</svg>
<!-- Time Text -->
<div class="flex flex-col items-center justify-center z-10 text-center">
<div class="text-[6rem] sm:text-[7.5rem] font-bold leading-none tracking-tighter tabular-nums text-slate-900 dark:text-white drop-shadow-sm select-none">
                            25:00
                        </div>
<div class="mt-2 text-base font-medium text-gray-500 dark:text-[#b79f9e] uppercase tracking-widest">
                            Focus Time
                        </div>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="mt-12 flex flex-col sm:flex-row gap-4 w-full max-w-sm justify-center">
<button class="flex-1 flex items-center justify-center gap-2 h-14 rounded-full bg-primary text-white text-lg font-bold shadow-lg shadow-primary/30 hover:shadow-primary/50 hover:bg-red-600 active:scale-95 transition-all duration-200 group">
<span class="material-symbols-outlined filled group-hover:scale-110 transition-transform">play_arrow</span>
                    Start
                </button>
<button class="flex-1 flex items-center justify-center gap-2 h-14 rounded-full bg-white dark:bg-surface-dark border border-gray-200 dark:border-[#382929] text-gray-700 dark:text-gray-200 text-lg font-bold hover:bg-gray-50 dark:hover:bg-[#2f2222] active:scale-95 transition-all duration-200 group">
<span class="material-symbols-outlined group-hover:-rotate-180 transition-transform duration-500">refresh</span>
                    Reset
                </button>
</div>
<!-- Session Status -->
<div class="mt-8 flex items-center gap-2 px-4 py-2 rounded-full bg-primary/5 dark:bg-primary/10 border border-primary/10 dark:border-primary/20">
<span class="material-symbols-outlined text-primary text-sm">check_circle</span>
<p class="text-sm font-medium text-primary">Session 1/4</p>
</div>
</main>
<!-- Decorative footer elements (Optional stats) -->
<footer class="w-full py-6 mt-auto">
<div class="flex justify-center gap-12 text-center opacity-60 hover:opacity-100 transition-opacity">
<div>
<p class="text-xs font-semibold uppercase tracking-wider text-gray-500 dark:text-[#b79f9e] mb-1">Target</p>
<p class="text-lg font-bold">4h 30m</p>
</div>
<div class="w-px h-auto bg-gray-300 dark:bg-[#382929]"></div>
<div>
<p class="text-xs font-semibold uppercase tracking-wider text-gray-500 dark:text-[#b79f9e] mb-1">Completed</p>
<p class="text-lg font-bold">1h 15m</p>
</div>
</div>
</footer>
</div>
</body></html>
