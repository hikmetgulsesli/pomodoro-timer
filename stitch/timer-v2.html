<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Pomodoro Focus - Desktop Timer</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#e53734",
                        "background-light": "#f8f6f6",
                        "background-dark": "#211111",
                        "surface-dark": "#2a1a1a",
                        "surface-light": "#ffffff",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col overflow-x-hidden selection:bg-primary selection:text-white">
<!-- Header / Navigation -->
<header class="w-full px-8 py-6 flex items-center justify-between z-10">
<div class="flex items-center gap-3">
<div class="size-8 flex items-center justify-center bg-primary rounded-full text-white shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-xl">timer</span>
</div>
<h1 class="text-xl font-bold tracking-tight hidden sm:block">Pomodoro Focus</h1>
</div>
<nav class="flex items-center gap-6">
<a class="text-sm font-medium opacity-60 hover:opacity-100 transition-opacity" href="#">Settings</a>
<a class="text-sm font-medium opacity-60 hover:opacity-100 transition-opacity" href="#">Log</a>
<button class="bg-primary/10 hover:bg-primary/20 text-primary px-5 py-2 rounded-full text-sm font-bold transition-colors">
                Login
            </button>
</nav>
</header>
<!-- Main Content -->
<main class="flex-1 flex flex-col items-center justify-center relative w-full max-w-7xl mx-auto px-4">
<!-- Mode Switcher -->
<div class="mb-12 z-10">
<div class="bg-surface-light dark:bg-surface-dark p-1.5 rounded-full flex items-center shadow-xl shadow-black/5 border border-slate-200 dark:border-white/5">
<button class="px-8 py-2.5 rounded-full bg-primary text-white text-sm font-bold shadow-md transition-all">
                    Work Mode
                </button>
<button class="px-8 py-2.5 rounded-full text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white text-sm font-bold transition-colors">
                    Break Mode
                </button>
</div>
</div>
<!-- Timer Circular Progress -->
<div class="relative flex items-center justify-center mb-12 group">
<!-- Decorative Glow -->
<div class="absolute inset-0 rounded-full bg-primary/20 blur-[100px] transform scale-75 pointer-events-none"></div>
<!-- SVG Circle Progress -->
<div class="relative size-80 md:size-96 flex items-center justify-center">
<svg class="transform -rotate-90 w-full h-full drop-shadow-2xl">
<!-- Background Circle -->
<circle class="text-slate-200 dark:text-white/5" cx="50%" cy="50%" fill="transparent" r="48%" stroke="currentColor" stroke-width="2"></circle>
<!-- Progress Circle -->
<circle class="transition-all duration-1000 ease-linear" cx="50%" cy="50%" fill="transparent" r="48%" stroke="#e53734" stroke-dasharray="800" stroke-dashoffset="200" stroke-linecap="round" stroke-width="4"></circle>
</svg>
<!-- Digital Timer Display -->
<div class="absolute inset-0 flex flex-col items-center justify-center">
<div class="text-8xl md:text-9xl font-bold tracking-tighter tabular-nums text-slate-900 dark:text-white drop-shadow-sm">
                        25:00
                    </div>
<p class="mt-4 text-slate-500 dark:text-slate-400 font-medium tracking-wide uppercase text-sm">Stay Focused</p>
</div>
</div>
</div>
<!-- Controls -->
<div class="flex flex-col items-center gap-8 w-full max-w-md z-10">
<!-- Action Buttons -->
<div class="flex items-center gap-4 w-full justify-center">
<button class="h-16 px-10 rounded-full bg-primary hover:bg-red-600 text-white text-lg font-bold tracking-wide shadow-lg shadow-primary/30 active:scale-95 transition-all flex items-center gap-2 min-w-[160px] justify-center">
<span class="material-symbols-outlined filled">play_arrow</span>
                    Start
                </button>
<button aria-label="Reset Timer" class="h-16 w-16 rounded-full bg-surface-light dark:bg-surface-dark border border-slate-200 dark:border-white/10 text-slate-900 dark:text-white hover:bg-slate-100 dark:hover:bg-white/5 flex items-center justify-center shadow-lg active:scale-95 transition-all">
<span class="material-symbols-outlined">refresh</span>
</button>
</div>
<!-- Stats -->
<div class="flex items-center gap-8 py-6 px-10 rounded-2xl bg-surface-light dark:bg-surface-dark border border-slate-200 dark:border-white/5 shadow-xl shadow-black/5 backdrop-blur-sm">
<div class="flex flex-col items-center gap-1">
<span class="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">Session</span>
<span class="text-xl font-bold text-slate-900 dark:text-white tabular-nums">1/4</span>
</div>
<div class="w-px h-8 bg-slate-200 dark:bg-white/10"></div>
<div class="flex flex-col items-center gap-1">
<span class="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">Completed</span>
<span class="text-xl font-bold text-slate-900 dark:text-white tabular-nums">2</span>
</div>
</div>
</div>
</main>
<!-- Background Elements -->
<div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-0 pointer-events-none">
<div class="absolute top-[-10%] right-[-5%] w-[500px] h-[500px] bg-primary/5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] left-[-5%] w-[400px] h-[400px] bg-blue-500/5 rounded-full blur-[120px]"></div>
</div>
<footer class="w-full p-6 text-center z-10">
<p class="text-slate-400 dark:text-slate-600 text-sm">Space Grotesk Design System © 2023</p>
</footer>
</body></html>
